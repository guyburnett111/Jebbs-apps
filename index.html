<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jebbs Apps</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #F8F9F6;
      color: #1C3A2E;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
    }

    .bg {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 70% 60% at 50% 50%, rgba(127,166,137,0.15) 0%, transparent 70%);
      animation: breathe 8s ease-in-out infinite alternate;
      pointer-events: none;
    }

    @keyframes breathe {
      0%   { opacity: 0.6; transform: scale(1); }
      100% { opacity: 1;   transform: scale(1.05); }
    }

    @media (prefers-reduced-motion: reduce) {
      .bg { animation: none; }
    }

    .content { position: relative; }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.8rem, 8vw, 5.5rem);
      font-weight: 300;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 0.5rem;
    }

    .byline {
      font-size: 0.78rem;
      font-weight: 400;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7FA689;
      margin-bottom: 2.5rem;
    }

    .coming-soon {
      font-size: 0.8rem;
      font-weight: 300;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #9aaa9d;
    }

    footer {
      position: fixed;
      bottom: 1.75rem;
      font-size: 0.72rem;
      color: #b0bcb2;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="content">
    <h1>Jebbs Apps</h1>
    <p class="byline">by 6974 Pty Ltd</p>
    <p class="coming-soon">Apps coming soon</p>
  </div>
  <footer>© 2025 6974 Pty Ltd</footer>
</body>
</html>
